<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONVERSOR DE SVG - D.P.V.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #f6f5f0; 
            font-family: 'Inter', sans-serif; 
        }
        .font-archivo { 
            font-family: 'Archivo', sans-serif; 
        }
        .h-screen-90 { height: 85vh; }
        
        /* Contenedor del mapa con sombra suave */
        .preview-container svg {
            width: 100%;
            height: 100%;
            max-height: 650px;
            filter: drop-shadow(0 20px 25px rgba(0, 0, 0, 0.05));
            overflow: visible;
        }

        /* Animación para el mensaje de copiado */
        #copy-msg.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen">

    <div class="max-w-5xl w-full text-center mb-6">
        <div class="flex justify-center items-center gap-3 mb-2">
            <span class="bg-gray-800 text-white text-[9px] font-bold px-2 py-0.5 rounded uppercase tracking-widest">Herramienta Interna</span>
        </div>
        
        <h1 class="text-2xl font-medium font-archivo text-gray-900 tracking-tight uppercase">
            CONVERSOR DE <span class="font-bold text-gray-950">SVG</span>
        </h1>
        
        <p class="text-gray-500 font-archivo text-[10px] mt-1 uppercase tracking-wider">
            Dpto. I - Prensa y Relaciones Institucionales
        </p>
    </div>

    <div class="max-w-7xl w-full flex flex-col lg:flex-row gap-6 h-screen-90">
        
        <!-- Panel Izquierdo: Entrada de código -->
        <div class="w-full lg:w-1/3 flex flex-col bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
            <div class="bg-gray-800 text-white p-4 text-sm font-semibold flex justify-between items-center">
                <span class="uppercase tracking-tighter">1. Pegá el SVG crudo</span>
                <button onclick="cargarEjemplo()" class="text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded transition italic">Ver ejemplo</button>
            </div>
            <textarea id="svg-input" class="flex-1 w-full p-4 text-xs font-mono text-gray-600 bg-gray-50 focus:outline-none resize-none" placeholder='Pega aquí el código exportado de QGIS o Inkscape...'></textarea>
        </div>

        <!-- Panel Derecho: Previsualización -->
        <div class="w-full lg:w-2/3 flex flex-col bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200 relative">
            
            <div class="bg-gray-100 p-4 border-b border-gray-200 flex justify-between items-center z-10">
                <span class="text-sm font-bold text-gray-700 uppercase tracking-tighter">2. Previsualización</span>
                <div class="flex gap-2">
                    <button onclick="copiarResultado()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-md flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        Copiar estilo
                    </button>
                </div>
            </div>
            
            <!-- Mensaje flotante de éxito -->
            <div id="copy-msg" class="absolute top-16 right-4 bg-emerald-100 border border-emerald-400 text-emerald-700 px-4 py-2 rounded shadow-lg text-sm font-bold opacity-0 transform translate-y-2 transition-all pointer-events-none z-20">
                ¡Código copiado para usar en Illustrator!
            </div>

            <div class="flex-1 bg-[#f6f5f0] p-8 flex items-center justify-center preview-container relative overflow-hidden" id="preview-container">
                <div class="text-gray-400 text-center pointer-events-none">
                    <svg class="w-12 h-12 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                    El mapa procesado aparecerá aquí
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputSvg = document.getElementById('svg-input');
        const previewContainer = document.getElementById('preview-container');
        let processedSvgString = "";

        // Estilos que se inyectan para la estética vial DPV
        const estilosInyectados = `
            <style>
                .departamento {
                    fill: #e0ded5; 
                    stroke: #fdfdfc; 
                    stroke-width: 1.2;
                    stroke-linejoin: round;
                    transition: all 0.3s ease;
                    cursor: pointer;
                    paint-order: stroke;
                }
                .depto-alt-1 { fill: #d8d6cc; }
                .depto-alt-2 { fill: #e5e3db; }
                .depto-alt-3 { fill: #d1cfc5; }
                
                .departamento:hover {
                    fill: #b5b3a9;
                    stroke: #ffffff;
                    stroke-width: 3;
                    filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.15));
                }
            </style>
        `;

        inputSvg.addEventListener('input', procesarSVG);

        function procesarSVG() {
            const rawCode = inputSvg.value.trim();
            
            if(rawCode === '') {
                previewContainer.innerHTML = `<div class="text-gray-400">Esperando código...</div>`;
                return;
            }

            // Validación flexible para aceptar XML headers o comentarios de Inkscape
            if (!rawCode.toLowerCase().includes('<svg')) {
                previewContainer.innerHTML = '<div class="text-red-500 font-medium text-center px-4">Error: No se encontró la etiqueta &lt;svg&gt;.</div>';
                return;
            }

            try {
                const parser = new DOMParser();
                const doc = parser.parseFromString(rawCode, "image/svg+xml");
                const svgElement = doc.querySelector('svg');

                if (!svgElement) throw new Error("No SVG found");

                // Ajustes de visualización responsive
                svgElement.removeAttribute('width');
                svgElement.removeAttribute('height');
                svgElement.setAttribute('preserveAspectRatio', 'xMidYMid meet');
                
                // Inyectar estilos DPV
                svgElement.insertAdjacentHTML('afterbegin', estilosInyectados);

                // Limpiar y clasificar polígonos
                const fronteras = doc.querySelectorAll('path, polygon, polyline, circle, rect');
                
                let counter = 0;
                fronteras.forEach(forma => {
                    forma.removeAttribute('fill');
                    forma.removeAttribute('stroke');
                    forma.removeAttribute('style');
                    forma.removeAttribute('stroke-width');

                    // Alternar colores para dar variedad visual
                    const variacionColor = (counter % 3) + 1;
                    forma.setAttribute('class', `departamento depto-alt-${variacionColor}`);
                    counter++;
                });

                processedSvgString = new XMLSerializer().serializeToString(svgElement);
                previewContainer.innerHTML = processedSvgString;

            } catch (error) {
                previewContainer.innerHTML = '<div class="text-amber-600 font-medium text-center">Error de procesamiento. Verifica el código fuente.</div>';
            }
        }

        function copiarResultado() {
            if (!processedSvgString) return;
            
            const textarea = document.createElement('textarea');
            textarea.value = processedSvgString;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);

            const msg = document.getElementById('copy-msg');
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 3000);
        }

        function cargarEjemplo() {
            inputSvg.value = `<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
    <path d="M10,10 L90,10 L80,70 L20,70 Z" />
    <path d="M90,10 L180,20 L170,80 L80,70 Z" />
    <path d="M20,70 L80,70 L90,130 L10,120 Z" />
    <path d="M80,70 L170,80 L160,140 L90,130 Z" />
</svg>`;
            procesarSVG();
        }
    </script>
</body>
</html>
